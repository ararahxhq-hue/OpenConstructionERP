# Dev Container overlay.
#
# This file is layered ON TOP of the repo's root ../docker-compose.yml by
# .devcontainer/devcontainer.json. The root file already defines the
# `postgres`, `redis` and `minio` services the app needs; here we only add
# the `devcontainer` service that VS Code attaches to (Python 3.12 + Node 20),
# with the whole repo bind-mounted so edits on the host are live inside.
#
# Service hostnames inside this network are `postgres`, `redis`, `minio`
# (NOT localhost), which is why the connection env vars below differ from
# ../.env.example.
services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/python:3.12-bookworm
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      # DB / cache / storage reachable by service name on the compose network
      DATABASE_URL: postgresql+asyncpg://oe:oe@postgres:5432/openestimate
      DATABASE_SYNC_URL: postgresql://oe:oe@postgres:5432/openestimate
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: openestimate
      # App config
      APP_ENV: development
      APP_DEBUG: "true"
      LOG_LEVEL: INFO
      ALLOWED_ORIGINS: "http://localhost:5173"
      # Dev-only secret: 32+ chars and not a well-known default, so the
      # backend's boot-time guard is satisfied. Never use this anywhere real.
      JWT_SECRET: "devcontainer-local-only-not-for-production-key-0a1b2c3d"
